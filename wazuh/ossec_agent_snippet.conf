<!--
  threat_meister - Wazuh AGENT configuration snippet
  Merge into: /var/ossec/etc/ossec.conf on the analysis host (the agent).
  Restart:    sudo systemctl restart wazuh-agent

  Blocks:
    1. FIM realtime monitoring of the sample dropzone (drives YARA AR).
    2. ClamAV log collection (on-access / scheduled scan results -> SIEM).
    3. rkhunter warning collection via command wodle.
    4. clamd on-access + rkhunter scheduled scan (run by cron/systemd, ingested here).
-->

<!-- 1. FIM: watch the dropzone in realtime. New/changed files trigger YARA AR. -->
<syscheck>
  <disabled>no</disabled>
  <directories realtime="yes" report_changes="yes" check_all="yes">/opt/threat_meister/dropzone</directories>
  <!-- Do NOT whodata-audit your inert sample store; only the dropzone. -->
</syscheck>

<!-- 2. ClamAV: forward daemon + scan logs into Wazuh (built-in clamd decoders parse these). -->
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/clamav/clamav.log</location>
</localfile>
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/clamav/freshclam.log</location>
</localfile>
<!-- If you run on-access scanning, clamonacc logs here too: -->
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/clamav/clamonacc.log</location>
</localfile>

<!-- 3. rkhunter: collect warnings from its logfile after each scheduled run. -->
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/rkhunter.log</location>
</localfile>

<!-- 4. Command monitoring: surface active rkhunter warnings on an interval.
     (Full scans are heavy; run the actual scan from cron/systemd-timer and let
     the localfile above ingest results. This wodle just tails the warning count.) -->
<wodle name="command">
  <disabled>no</disabled>
  <tag>rkhunter_warnings</tag>
  <command>/bin/sh -c "grep -c '\\[ Warning \\]' /var/log/rkhunter.log 2>/dev/null || echo 0"</command>
  <interval>12h</interval>
  <ignore_output>no</ignore_output>
  <run_on_start>yes</run_on_start>
  <timeout>30</timeout>
</wodle>
