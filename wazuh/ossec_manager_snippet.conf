<!--
  threat_meister - Wazuh MANAGER configuration snippet
  Merge into: /var/ossec/etc/ossec.conf on the Wazuh manager.
  Restart:    sudo systemctl restart wazuh-manager

  Binds the yara.sh active-response script to the dropzone FIM rules
  (100200 = modified, 100201 = added). extra_args[1] = yara binary dir,
  extra_args[3] = deployed rule bundle path. These indices are what yara.sh
  reads via jq, so keep the "-yara_path <dir> -yara_rules <file>" ordering.
-->
<ossec_config>

  <command>
    <name>yara_linux</name>
    <executable>yara.sh</executable>
    <extra_args>-yara_path /usr/bin -yara_rules /var/ossec/active-response/bin/yara/rules/lab_rules.yar</extra_args>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <active-response>
    <disabled>no</disabled>
    <command>yara_linux</command>
    <location>local</location>
    <rules_id>100200,100201</rules_id>
  </active-response>

</ossec_config>

<!--
  NOTES
  - On Arch, the yara binary is /usr/bin/yara (pacman package), hence
    -yara_path /usr/bin. On the Wazuh Ubuntu docs it's /usr/local/bin.
  - Deploy your compiled bundle to the agent at:
      /var/ossec/active-response/bin/yara/rules/lab_rules.yar
    (threat_meister yara-bundle produces exports/lab_rules.yar -> scp it there,
     chown root:wazuh, chmod 750).
  - yara.sh takes ONE .yar file, not a directory. The bundle solves that.
-->
